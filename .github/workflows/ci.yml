name: CI

on:
  push:
    branches:
      - main
      - "codex*"
  pull_request:

jobs:
  verify:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install web dependencies
        run: pnpm install --frozen-lockfile

      - name: Install package and dev tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: App unit tests
        run: pnpm test

      - name: App type check
        run: pnpm check

      - name: App production build
        run: pnpm build

      - name: Ruff format check
        run: ruff format . --check

      - name: Ruff lint
        run: ruff check .

      - name: Pytest
        run: pytest -q

      - name: Repo contract checks
        run: python scripts/check_repo.py
